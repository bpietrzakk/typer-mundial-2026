name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'mundial-backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./mundial-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mundial-backend:latest
            ghcr.io/${{ github.repository_owner }}/mundial-backend:${{ github.sha }}

      - name: Trigger Render deploy
        run: curl "${{ secrets.RENDER_DEPLOY_HOOK }}"
