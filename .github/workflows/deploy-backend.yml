name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'mundial-backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push to ACR
        run: |
          az acr build \
            --registry mundialtyper \
            --image backend:${{ github.sha }} \
            --image backend:latest \
            ./mundial-backend

      - name: Update Container App
        run: |
          az containerapp update \
            --name mundial-backend \
            --resource-group mundial-rg \
            --image mundialtyper.azurecr.io/backend:${{ github.sha }}
