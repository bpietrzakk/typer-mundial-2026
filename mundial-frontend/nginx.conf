server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API requests: /api/auth/login -> backend /auth/login
    # the trailing slash on proxy_pass strips the /api/ prefix, so the
    # backend stays unaware of the prefix and needs no changes.
    # this also avoids the name clash between React routes (/matches,
    # /ranking, /leagues) and API endpoints of the same name.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # X-Forwarded-For is read by the login rate limiter — without it
        # every request would look like it came from nginx's IP and the
        # whole site would lock after 5 failed logins (decisions #007)
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # pass the httpOnly auth cookie through untouched
        proxy_pass_request_headers on;
    }

    # everything else is the SPA — React Router handles client-side routes,
    # so unknown paths fall back to index.html instead of 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
